name: CI

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install -r scripts/subset_selection/requirements.txt

      - name: Run unit tests with coverage
        run: pytest tests/unit/ --cov --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Run notebook parameter validation
        run: pytest tests/integration/test_notebook_parameters.py -v

      - name: Upload coverage to Codecov
        if: github.event_name == 'pull_request'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
