repos:
  # Ruff: lint then format (order matters — lint autofixes before formatting)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.0
    hooks:
      - id: ruff
        name: ruff-lint
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python]
      - id: ruff-format
        name: ruff-format
        types_or: [python]

  # Strip notebook outputs before commit
  - repo: https://github.com/kynan/nbstripout
    rev: 0.8.1
    hooks:
      - id: nbstripout
        types: [jupyter]

  # Validate YAML syntax (catches broken workflow/pipeline files)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        args: [--unsafe]  # allow custom YAML tags used by GitHub Actions
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]

  # Type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        name: mypy
        pass_filenames: false
        args: [scripts/, tests/, kubeflow-pipelines/]
        additional_dependencies: [types-requests]
        stages: [pre-push]

exclude: |
  (?x)(
    ^\.git/|
    ^\.venv/|^venv/|
    ^\.pytest_cache/|^\.mypy_cache/|
    ^\.ipynb_checkpoints/|
    _compiled\.yaml$
  )
