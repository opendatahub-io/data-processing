[tool.ruff]
line-length = 88
target-version = "py312"

# Exclude generated files, virtualenvs, and other non-source paths
extend-exclude = [
  ".ipynb_checkpoints",
  ".venv",
  "venv",
]

# Lint rules to enable:
# E pycodestyle
# F pyflakes
# I import sorting (isort-compatible)
# B flake8-bugbear (common bug patterns)
# W warnings
# UP pyupgrade (modernize syntax)
lint.select = ["E","F","I","B","W","UP"]

# Rules to ignore:
# E203  whitespace before ':' (Black-compatible)
# E501  line length (Black handles line wrapping)
# UP006  keep typing.List instead of converting to list (PEP 585)
# UP007  keep typing.Dict instead of converting to dict (PEP 585)
# UP035  keep typing.Optional instead of converting to | None (PEP 604)
lint.ignore = ["E203","E501","UP006","UP007","UP035"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = ["--tb=short", "-v"]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
warn_unused_ignores = true
warn_redundant_casts = true
check_untyped_defs = true
disallow_untyped_defs = false
disallow_incomplete_defs = true
no_implicit_optional = true
strict_equality = true
show_error_codes = true
show_column_numbers = true

# Exclude generated and non-source files
exclude = [
  "venv/",
  "\\.venv/",
  "\\.ipynb_checkpoints/",
  "local_outputs/",
]

# -- Per-module overrides --

# KFP components: imports happen inside function bodies and reference
# packages only available in the container base image (docling, etc.).
# These cannot be resolved locally, so we suppress import errors.
[[tool.mypy.overrides]]
module = [
  "kubeflow-pipelines.common.components",
  "kubeflow-pipelines.docling-standard.standard_components",
  "kubeflow-pipelines.docling-vlm.vlm_components",
]
disable_error_code = ["import-not-found"]

# Third-party libraries without type stubs
[[tool.mypy.overrides]]
module = [
  "kfp.*",
  "docling.*",
  "docling_core.*",
  "datasets",
  "h5py",
  "jinja2",
  "papermill",
  "nbformat",
  "nbformat.*",
  "submodlib",
  "transformers",
  "tqdm",
]
ignore_missing_imports = true